services:
  - type: web
    name: website-status
    env: node
    buildCommand: npm install && npx prisma migrate deploy && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: website-status-db
          property: connectionString

databases:
  - name: website-status-db
    databaseName: website_status
