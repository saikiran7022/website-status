services:
  - type: web
    name: website-status
    env: node
    plan: free
    region: oregon
    buildCommand: npm install && npm run build
    startCommand: npx prisma db push --accept-data-loss && npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      # Must match the CRON_SECRET GitHub Actions secret used by .github/workflows/cron.yml
      - key: CRON_SECRET
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: website-status-db
          property: connectionString
      - key: NEXT_PUBLIC_APP_URL
        fromService:
          name: website-status
          property: host
          envVarKey: RENDER_EXTERNAL_URL
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: NEXT_PUBLIC_GITHUB_CLIENT_ID
        sync: false

# Continuous monitor checks are driven by a scheduled GitHub Actions workflow
# (.github/workflows/cron.yml) that POSTs to /api/cron every 5 minutes — this
# keeps the deployment on Render's free tier. To run checks in-process instead,
# add a paid `type: worker` service running `npm run worker`.

databases:
  - name: website-status-db
    plan: free
    databaseName: website_status
