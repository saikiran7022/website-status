services:
  - type: web
    name: website-status
    env: node
    plan: free
    region: oregon
    buildCommand: npm install && npm run build
    startCommand: npx prisma db push --accept-data-loss && npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: CRON_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: website-status-db
          property: connectionString
      - key: NEXT_PUBLIC_APP_URL
        fromService:
          name: website-status
          property: host
          envVarKey: RENDER_EXTERNAL_URL
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: NEXT_PUBLIC_GITHUB_CLIENT_ID
        sync: false

  # Long-running worker that checks due monitors on a schedule (node-cron).
  - type: worker
    name: website-status-worker
    env: node
    plan: free
    region: oregon
    buildCommand: npm install && npx prisma generate
    startCommand: npm run worker
    envVars:
      - key: NODE_ENV
        value: production
      - key: WORKER_CRON
        value: "* * * * *"
      - key: DATABASE_URL
        fromDatabase:
          name: website-status-db
          property: connectionString
      - key: NEXT_PUBLIC_APP_URL
        fromService:
          name: website-status
          property: host
          envVarKey: RENDER_EXTERNAL_URL
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false

databases:
  - name: website-status-db
    plan: free
    databaseName: website_status
