services:
  - type: web
    name: website-status
    env: node
    region: oregon
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 22.0.0
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: website-status-db
          property: connectionString
      - key: NEXT_PUBLIC_APP_URL
        fromService:
          name: website-status
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: NEXTAUTH_SECRET
        generateValue: true

  - type: worker
    name: check-worker
    env: node
    region: oregon
    plan: starter
    buildCommand: npm install
    startCommand: npm run worker
    envVars:
      - key: NODE_VERSION
        value: 22.0.0
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: website-status-db
          property: connectionString

databases:
  - name: website-status-db
    plan: starter
