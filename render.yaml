services:
  - type: web
    name: website-status
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npx prisma migrate deploy && npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: website-status-db
          property: connectionString

databases:
  - name: website-status-db
    plan: free
    databaseName: website_status
